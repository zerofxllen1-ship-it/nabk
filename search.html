<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Search Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; } 
        input[type='text'] { width: 300px; padding: 10px; margin-top: 20px; } 
        ul { list-style-type: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Interactive Search Interface</h1>
    <input type="text" id="searchInput" placeholder="Search by word, prefix, or suffix..." />
    <ul id="results"></ul>

    <script>
        const words = []; // This will be populated from the 'every word' file

        async function loadWords() {
            const response = await fetch('path/to/every_word_file.txt'); // replace with actual path
            const data = await response.text();
            words.push(...data.split('\n'));
        }

        function searchWords() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const results = words.filter(word => 
                word.startsWith(input) || word.endsWith(input) || word === input
            );
            displayResults(results);
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = results.map(word => `<li>${word}</li>`).join('');
        }

        document.getElementById('searchInput').addEventListener('input', searchWords);
        loadWords();
    </script>
</body>
</html>
